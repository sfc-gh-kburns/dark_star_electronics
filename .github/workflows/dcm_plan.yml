name: DCM Plan (PR)

# Read-only safety check.
# On every PR to main, runs `snow dcm raw-analyze` + `snow dcm plan` against
# DEV / TEST / PROD targets and posts a CREATE/ALTER/DROP summary as a PR comment.
# NO deploys happen here.

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dcm-plan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: snow dcm plan (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [DEV, TEST, PROD]

    env:
      SNOWFLAKE_CONNECTION_NAME: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake CLI
        run: |
          python -m pip install --upgrade pip
          pip install snowflake-cli

      - name: Configure Snowflake JWT connection (DEV deployer for plan)
        env:
          SNOWFLAKE_ACCOUNT:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:        ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE:        ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE:   ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          umask 077
          printf "%s" "$SNOWFLAKE_PRIVATE_KEY" | base64 -d > ~/.snowflake/dcm_key.p8
          cat > ~/.snowflake/connections.toml <<EOF
          [ci]
          account             = "${SNOWFLAKE_ACCOUNT}"
          user                = "${SNOWFLAKE_USER}"
          role                = "${SNOWFLAKE_ROLE}"
          warehouse           = "${SNOWFLAKE_WAREHOUSE}"
          authenticator       = "SNOWFLAKE_JWT"
          private_key_file    = "/home/runner/.snowflake/dcm_key.p8"
          database            = "CODE_DB"
          schema              = "DCM"
          EOF
          chmod 600 ~/.snowflake/connections.toml

      - name: snow dcm raw-analyze (${{ matrix.target }})
        run: |
          snow dcm raw-analyze \
            CODE_DB.DCM.DARK_STAR_PROJECT_${{ matrix.target }} \
            -c ci --target ${{ matrix.target }}

      - name: snow dcm plan (${{ matrix.target }})
        run: |
          snow dcm plan \
            CODE_DB.DCM.DARK_STAR_PROJECT_${{ matrix.target }} \
            -c ci --target ${{ matrix.target }} --save-output

      - name: Build summary
        id: summarize
        run: |
          python - <<'PY'
          import json, os, collections, pathlib
          p = pathlib.Path("out/plan/plan_result.json")
          if not p.exists():
              print("No plan_result.json"); exit(0)
          d = json.loads(p.read_text())
          ops = d.get("operations", [])
          counts = collections.Counter()
          for o in ops:
              k = o.get("operationType") or o.get("association") or "OTHER"
              counts[k] += 1
          line = f"**${{ matrix.target }}** — status: `{d.get('status','?')}` · "
          line += " · ".join([f"{k}: {v}" for k,v in sorted(counts.items())]) or "no ops"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(line + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"summary_line<<EOT\n{line}\nEOT\n")
          PY

      - name: Comment plan summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const line = `${{ steps.summarize.outputs.summary_line }}`;
            const marker = `<!-- dcm-plan-${{ matrix.target }} -->`;
            const body   = `${marker}\n${line}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      - name: Upload plan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dcm-plan-${{ matrix.target }}
          path: out/plan/
          retention-days: 14
