name: DCM Drift Check

# Nightly cron + manual trigger.
# Runs `snow dcm plan` against each env and FAILS if it returns any operations
# (i.e. someone made an out-of-band change to Snowflake that the repo is unaware of).
# When drift is detected, opens/updates a GitHub issue.

on:
  schedule:
    - cron: '0 9 * * *'      # 09:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: Drift check (${{ matrix.target }})
    runs-on: ubuntu-latest
    environment: ${{ matrix.env_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: DEV
            env_name: dev
          - target: TEST
            env_name: test
          - target: PROD
            env_name: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Snowflake CLI
        run: pip install --upgrade snowflake-cli

      - name: Configure Snowflake JWT connection
        env:
          SNOWFLAKE_ACCOUNT:     ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:        ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE:        ${{ secrets.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE:   ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.snowflake
          umask 077
          echo "$SNOWFLAKE_PRIVATE_KEY" > ~/.snowflake/dcm_key.p8
          cat > ~/.snowflake/connections.toml <<EOF
          [ci]
          account             = "${SNOWFLAKE_ACCOUNT}"
          user                = "${SNOWFLAKE_USER}"
          role                = "${SNOWFLAKE_ROLE}"
          warehouse           = "${SNOWFLAKE_WAREHOUSE}"
          authenticator       = "SNOWFLAKE_JWT"
          private_key_file    = "/home/runner/.snowflake/dcm_key.p8"
          database            = "CODE_DB"
          schema              = "DCM"
          EOF
          chmod 600 ~/.snowflake/connections.toml

      - name: snow dcm plan
        run: |
          snow dcm plan \
            CODE_DB.DCM.DARK_STAR_PROJECT_${{ matrix.target }} \
            -c ci --target ${{ matrix.target }} --save-output

      - name: Detect drift
        id: drift
        run: |
          python - <<'PY'
          import json, os, pathlib
          p = pathlib.Path("out/plan/plan_result.json")
          if not p.exists():
              print("no plan output"); exit(0)
          d = json.loads(p.read_text())
          ops = d.get("operations", [])
          n = len(ops)
          line = f"${{ matrix.target }} drift: {n} ops"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(line + "\n")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"count={n}\n")
          PY

      - name: Open / update issue if drift found
        if: ${{ steps.drift.outputs.count != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ matrix.target }}';
            const count  = '${{ steps.drift.outputs.count }}';
            const title  = `Drift detected in ${target}`;
            const body   = `Nightly drift check found **${count}** unexpected operation(s) on \`${target}\`.\n\nReview the workflow artifact \`out/plan/plan_result.json\` for details and reconcile the repo with Snowflake.`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'drift',
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['drift'],
              });
            }

      - name: Fail job if drift detected
        if: ${{ steps.drift.outputs.count != '0' }}
        run: exit 1

      - name: Upload plan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ matrix.target }}
          path: out/
          retention-days: 14
